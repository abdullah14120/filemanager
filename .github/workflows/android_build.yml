name: Android CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build and Validate Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Generate New Gradle Wrapper Automatically
        run: |
          # توليد الـ Wrapper المتوافق مع إعدادات الـ Plugins المعدلة
          gradle wrapper --gradle-version 8.5 --distribution-type bin
          
          if [ -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Success: gradle-wrapper.jar has been generated."
          else
            echo "Critical Error: gradle-wrapper.jar generation failed!" && exit 1
          fi
          
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
