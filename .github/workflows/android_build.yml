name: Android CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build and Validate Project
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود المصدري للمشروع
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. إعداد ومزامنة بيئة Gradle بإصدار مستقر ومحدد مع كاش تلقائي
      - name: Setup Gradle Environment
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7' # إصدار مستقر يمنع مشاكل التوافقية مع الـ Plugins

      # 4. توليد ملف الـ Wrapper بشكل متناسق مع البيئة المحددة
      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.7 --distribution-type bin
          chmod +x gradlew

      # 5. بناء التطبيق النهائي وتتبع الأخطاء بدقة
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 6. رفع ملف الـ APK كـ Artifact للتحميل
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
